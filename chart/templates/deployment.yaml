apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "compat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "compat.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.env.PORT }}
          protocol: TCP
        env:
        - name: SERVICE_NAME
          value: {{ .Values.env.SERVICE_NAME | quote }}
        - name: APP_MESSAGE
          value: {{ .Values.env.APP_MESSAGE | quote }}
        - name: APP_ENV
          value: {{ .Values.env.APP_ENV | quote }}
        - name: PORT
          value: {{ .Values.env.PORT | quote }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
