apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-connection"
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
  containers:
    - name: curl
      image: cgr.dev/chainguard/curl:latest
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command: ['curl']
      args:
        - '-sf'
        - '--fail-early'
        - 'http://{{ .Chart.Name }}:{{ .Values.service.port }}/healthz'
        - 'http://{{ .Chart.Name }}:{{ .Values.service.port }}/'
        - 'http://{{ .Chart.Name }}:{{ .Values.service.port }}/test'
