name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-package-vouch-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup
      
      - name: Build Docker image
        run: uds run build
      
      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      - name: Build Zarf package
        run: |
          uds run build-zarf-package

      - name: Vouch for Zarf Package
        env:
          OLM_TOKEN: ${{ secrets.OLM_TOKEN }}
          OLM_CONTROL_PLANE: attest-cp.uds.run:443
          OLM_CAS_SERVER: attest-cas.uds.run:443
        run: |
          echo -e "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          chmod 600 cosign.key
          cat cosign.key
          ./olm vouch zarf-package-*.tar.zst --key ./cosign.key --log-level debug
          rm -f cosign.key
      
      - name: Publish Zarf Package
        run: |
          uds zarf tools registry login -u ${{ secrets.DEMO_ORG_USER_ID }} -p ${{ secrets.DEMO_ORG_PASSWORD }} registry.uds.run
          uds zarf package publish zarf-package-*.tar.zst oci://registry.uds.run/uds-army-demo