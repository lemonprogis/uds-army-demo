name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-package-vouch-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      - name: Install Oras
        uses: oras-project/setup-oras@v1

      - name: Install OpenGrep
        run: |
          curl -sSL https://raw.githubusercontent.com/opengrep/opengrep/v1.15.1/install.sh | bash
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"

      - name: Prepare
        id: prep
        run: |
          VERSION=sha-${GITHUB_SHA::8}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF/refs\/tags\//}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Dockerfile
        uses: docker/build-push-action@v4
        id: build-and-push
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.prep.outputs.VERSION }}

      - name: OpenGrep Scan
        run: |
          opengrep scan --sarif --sarif-output opengrep.sarif.json
      
      - name: Sign image with a key
        id: image_sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}
          SIG_BUNDLE_DIGEST=$(oras manifest fetch "$(oras discover "ghcr.io/${{ github.repository }}@${{ steps.build-and-push.outputs.digest }}" --format json | jq -r '.referrers[].reference')" | jq -r '.layers[] | select(.mediaType=="application/vnd.dev.sigstore.bundle.v0.3+json") | .digest')
          echo "sig_bundle_digest=$SIG_BUNDLE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Build Zarf package
        run: |
          ARCHITECTURE="amd64"
          FLAVOR="upstream"
          uds zarf package create . --confirm --no-progress --architecture="${ARCHITECTURE}" --flavor "${FLAVOR}" --set IMAGE_DIGEST="${{ steps.build-and-push.outputs.digest }}" --set SIG_BUNDLE_DIGEST="${{ steps.image_sign.outputs.sig_bundle_digest }}"

      - name: Vouch for Zarf Package
        env:
          OLM_TOKEN: ${{ secrets.OLM_TOKEN }}
          OLM_CONTROL_PLANE: attest-cp.uds.run:443
          OLM_CAS_SERVER: attest-cas.uds.run:443
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          ./olm vouch zarf-package-*.tar.zst --key cosign.key --opengrep-evidence opengrep.sarif.json --log-level debug

      - name: Publish Zarf Package
        run: |
          uds zarf tools registry login -u ${{ secrets.DEMO_ORG_USER_ID }} -p ${{ secrets.DEMO_ORG_PASSWORD }} registry.uds.run
          uds zarf package publish zarf-package-*.tar.zst oci://registry.uds.run/uds-army-demo
