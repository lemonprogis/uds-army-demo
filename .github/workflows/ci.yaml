name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-package-vouche-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup
      
      - name: Build Docker image
        run: uds run build
      
      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      - name: Build Zarf package
        run: |
          uds run build-zarf-package

      - name: Vouch for Zarf Package
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}  # if your key is password-protected
          OLM_TOKEN: ${{ secrets.OLM_TOKEN }}
          OLM_CONTROL_PLANE: cp.uds.run:443
          OLM_CAS_SERVER: cas.uds.run:443
        run: |
          ls -la
          ./olm vouch zarf-package-*.tar.zst --key env://COSIGN_KEY --log-level debug
      
      - name: Publish Zarf Package
        run: |
          uds zarf tools registry login -u ${{ secrets.DEMO_ORG_USER_ID }} -p ${{ secrets.DEMO_ORG_PASSWORD }} registry.uds.run
          uds zarf package publish zarf-package-*.tar.zst oci://registry.uds.run/uds-army-demo