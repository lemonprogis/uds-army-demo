name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup
      
      - name: Build Docker image
        run: uds run build
      
      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      #- name: Build Zarf package
      #  run: |
      #    uds run build-zarf-package

      - name: Vouch for Zarf Package
        run: |
          ls -la
          echo ${{ secrets.COSIGN_PRIVATE_KEY }} > cosign.key
          #./olm vouch zarf-package-*.tar.zst --key cosign.key --token ${{ secrets.OLM_TOKEN }} --log-level debug
      
