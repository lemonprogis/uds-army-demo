name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-package-vouch-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
    
      - name: UDS CLI Setup
        uses: ./.github/actions/uds-cli-setup
      
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: OLM CLI Setup
        uses: ./.github/actions/olm-cli-setup
        with:
          username: ${{ secrets.OLM_USER_ID }}
          password: ${{ secrets.OLM_PASSWORD }}

      - name: Install OpenGrep
        run: |
          curl -sSL https://raw.githubusercontent.com/opengrep/opengrep/v1.15.1/install.sh | bash
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"

      - name: Witness Run OpenGrep
        uses: testifysec/witness-run-action@7aa15e327829f1f2a523365c564c948d5dde69dd # v0.3.3
        with:
          step: opengrep
          enable-archivista: false
          enable-sigstore: false
          command: opengrep scan --sarif --sarif-output opengrep.sarif.json
          key: cosign.key

      - name: Build Zarf package
        run: |
          ARCHITECTURE="amd64"
          FLAVOR="upstream"
          uds zarf package create . --confirm --no-progress --architecture="${ARCHITECTURE}" --flavor "${FLAVOR}"

      - name: Vouch for Zarf Package
        env:
          OLM_TOKEN: ${{ secrets.OLM_TOKEN }}
          OLM_CONTROL_PLANE: cp-api.uds.run:443
          OLM_CAS_SERVER: cas-api.uds.run:443
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          ./olm vouch zarf-package-*.tar.zst --key cosign.key --opengrep-evidence opengrep.sarif.json --log-level debug --test-directory tests

      - name: Publish Zarf Package
        run: |
          uds zarf tools registry login -u ${{ secrets.DEMO_ORG_USER_ID }} -p ${{ secrets.DEMO_ORG_PASSWORD }} registry.uds.run
          uds zarf package publish zarf-package-*.tar.zst oci://registry.uds.run/uds-army-demo
