kind: UDS STIG Profile
metadata:
  name: uds-army-demo
  fqdn: demo-app.uds.dev
  description: >-
    Minimal Python Flask web application deployed via Zarf/UDS on Kubernetes.
    Serves a static dashboard UI with four endpoints: / (HTML), /api (JSON),
    /hey (greeting), /healthz (health check). Stateless with no database.
    Authentication via authservice + Keycloak (OIDC/SSO). Runs as non-root
    in Alpine container behind Istio ambient mesh with network policies.

stigs:
  - id: asd_v6r4
    description: Application Security and Development STIG, Version 6, Revision 4
    characteristics:
      uses_soap: false
      uses_saml: false
      uses_xml: false
      uses_database: false
      uses_passwords: false
      uses_pki_cac: false
      processes_classified_data: false
      processes_cui: false
      has_user_input: false
      has_admin_interface: false
      has_file_upload: false
      is_stateless: true
      has_mobile_code: false
      is_high_availability: false
      is_publicly_accessible: false
      has_web_services: false
      has_shared_accounts: false
      has_non_local_maintenance: false
      does_key_exchange: false
      is_transaction_based: false
      is_config_mgmt_app: false
      authenticates_devices: false
      has_crypto_module_access: false
      in_dod_dmz: false
      is_critical: false
      hosts_non_org_users: false
      developed_in_house: true
      language: python
    platform:
      auth_provider: "Keycloak SSO (OIDC)"
      auth_proxy: "authservice"
      service_mesh: "Istio ambient"
      tls_provider: "Istio mTLS + UDS tenant gateway"
      container_runtime: "Kubernetes"
      container_user: "non-root (appuser)"
      base_image: "python:3.13.11-alpine"
      network_policies: true
      cicd_sast: "OpenGrep"
      cicd_secrets_scan: "Gitleaks"
      cicd_signing: "Sigstore/Cosign + Witness"
      dependency_monitoring: "Renovate"
      scm: "GitHub"
      defect_tracking: "GitHub Issues"
      centralized_logging: true
      resource_limits: "CPU: 200m, Memory: 256Mi"

# Optional: per-rule overrides (use APSC-DV-XXXXXX rule_version as key)
# overrides:
#   APSC-DV-000010:
#     status: not_a_finding
#     finding_details: "Custom finding details for this rule."
#     comments: "Optional comments."
