# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: demo-app-common
  description: "UDS Example App 2 Common Package"

components:
  - name: demo-app
    required: true
    charts:
      - name: uds-demo-app-config
        namespace: demo-app
        version: 0.1.0
        localPath: ../chart
      - name: demo-app
        namespace: demo-app
        localPath: ../app/chart
        version: 2.1.0
        valuesFiles:
          - ../values/common-values.yaml
