includes:
  - common-setup: https://raw.githubusercontent.com/defenseunicorns/uds-common/v1.23.0/tasks/setup.yaml

tasks:
  - name: test
    actions:
      - task: e2e-test

  - name: e2e-test
    actions:
      - description: "Setup the Doug User for testing"
        task: common-setup:keycloak-user
        with:
          group: "/UDS Core/Admin"
      - description: E2E Tests
        cmd: |
          # renovate: datasource=docker depName=mcr.microsoft.com/playwright versioning=docker
          docker run --rm --ipc=host --net=host --mount type=bind,source="$(pwd)",target=/app mcr.microsoft.com/playwright:v1.58.0-noble sh -c " \
            cd app && \
            npm ci && \
            npx playwright test app.test.ts \
            "
        dir: tests/playwright
