# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: demo-app
  description: "UDS Army Demo"
  version: "dev"

constants:
  - name: IMAGE_TAG
    value: "###ZARF_PKG_TMPL_IMAGE_TAG###"
  - name: IMAGE_DIGEST
    value: "###ZARF_PKG_TMPL_IMAGE_DIGEST###"
  - name: SIG_BUNDLE_REF
    value: "###ZARF_PKG_TMPL_SIG_BUNDLE_REF###"

components:
  - name: demo-app
    required: true
    description: "Deploy Demo App"
    import:
      path: common
    only:
      flavor: upstream
    charts:
      - name: demo-app
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - ghcr.io/lemonprogis/uds-army-demo:###ZARF_PKG_TMPL_IMAGE_TAG###@###ZARF_PKG_TMPL_IMAGE_DIGEST###
      - "###ZARF_PKG_TMPL_SIG_BUNDLE_REF###"
