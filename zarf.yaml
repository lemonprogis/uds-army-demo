# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: demo-app
  description: "UDS Army Demo"
  version: "2.1.15"
    
components:
  - name: demo-app
    required: true
    description: Deploy demo app
    charts:
      - name: demo-app
        localPath: chart
        namespace: demo-app
        version: 2.1.15
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - ghcr.io/lemonprogis/uds-army-demo:2.1.15
    actions:
      onCreate:
        before:
          # Ensure buildx builder exists with multi-platform support
          - cmd: docker buildx inspect uds-builder >/dev/null 2>&1 || docker buildx create --name uds-builder --use --bootstrap
          - cmd: docker buildx use uds-builder
          - cmd: |
              docker buildx build --no-cache --load -t ghcr.io/lemonprogis/uds-army-demo:2.1.15 --platform linux/###ZARF_PKG_ARCH### ./app