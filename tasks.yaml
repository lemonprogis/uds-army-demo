tasks:
  - name: test
    actions:
      - task: setup 
      #- task: local-test

  - name: setup
    actions:
      - description: Deploy k3d cluster and UDS core
        maxRetries: 30
        cmd: |
          k3d cluster delete uds || true
          uds zarf package deploy oci://defenseunicorns/uds-k3d:0.19.4 --confirm
          uds zarf tools download-init
          uds zarf init --confirm
      - description: Create and deploy demo app bundle
        cmd: |
          uds zarf package create . --confirm
          uds create bundle --confirm
          uds deploy bundle/uds-bundle-demo-app-test-arm64-dev.tar.zst --confirm
  - name: local-test
    actions:
      - description: Demo App UI Status Check
        maxRetries: 30
        cmd: |
          STATUS=$(curl -L -o /dev/null -s -w "%{http_code}\n" https://demo-app.uds.dev)
          echo "Demo app system status: ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            sleep 10
            exit 1
          fi